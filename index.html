<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locafy_Core | Dual Console</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    background:#050505;
    color:#11F408;
    font-family:'Fira Code', monospace;
    margin:0;
    overflow:hidden;
}

/* CRT EFFECT */
.crt-overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%),
    linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
    background-size:100% 3px, 3px 100%;
    pointer-events:none;
}

/* START SCREEN */
#start-screen {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:999;
    cursor:pointer;
}

.run-text {
    font-size:22px;
    letter-spacing:2px;
    border:1px solid #11F408;
    padding:15px 30px;
    transition:0.3s;
}

.run-text:hover {
    background:#11F408;
    color:#000;
    box-shadow:0 0 20px #11F408;
}

/* TERMINALS */
#top-terminal, #main-terminal {
    width:90%;
    max-width:700px;
    margin:20px auto;
    border:1px solid rgba(17,244,8,0.2);
    padding:15px;
    position:relative;
    overflow:hidden;
}

/* TOP */
#top-terminal { height:250px; }

/* BOTTOM */
#main-terminal { height:20vh; }

/* SCROLL GLOW */
#top-terminal::after,
#main-terminal::after {
    content:"";
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    /* background:linear-gradient(transparent, rgba(17,244,8,0.2)); */
}

/* COLORS */
.system {color:#11F408;}
.process {color:#00CCFF;}
.action {color:#FFFF00;}
.success {color:#11F408; font-weight:bold;}
.danger {color:#ff3333; font-weight:bold;}

.log-line {margin:4px 0; font-size:14px;}

.cursor {
    width:8px;
    height:14px;
    background:#11F408;
    display:inline-block;
    animation:blink 1s infinite;
}

@keyframes blink {50%{opacity:0}}

.footer-hint {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 10px;
    color: rgba(17, 244, 8, 0.4);
    letter-spacing: 1px;
}

#mobile-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    display: flex;
    gap: calc(90vw - 50vw) 10px; /* Dynamic gap based on screen size */
}

#mobile-controls button {
    display: block;
    margin: 5px 0;
    background: black;
    color: #11F408;
    border: 1px solid #11F408;
    padding: 8px 12px;
    font-family: 'Fira Code';
}



</style>

</head>

<body>

<div class="crt-overlay"></div>

<!-- START SCREEN -->

<div id="start-screen" onclick="start()">
    <div class="run-text">RUN LOCAFY.OS</div>
</div>

<!-- TOP TERMINAL -->

<div id="top-terminal">
    <div id="top-output"></div>
</div>

<!-- BOTTOM TERMINAL -->

<div id="main-terminal">
    <div id="log-output"></div>
    <span class="cursor"></span>
</div>

<div class="footer-hint">
    PRESS [CTRL + C] TO STOP EXPLOITING | PRESS [CTRL + R] TO RESTART
</div>


<div id="mobile-controls">
    <button onclick="triggerAbort()">ABORT</button>
    <button onclick="location.reload()">RESTART</button>
</div>


<script>




function triggerAbort() {
    const event = new KeyboardEvent('keydown', {
        key: 'c',
        ctrlKey: true
    });
    window.dispatchEvent(event);
}
/* ================= CONFIG ================= */
const CONFIG = {
    TOP_SPEED: 1000,
    BOTTOM_SPEED: 2500,

    DOWNLOAD_SPEED: 400,
    FIREWALL_SPEED: 600,
    FINALIZE_SPEED: 300,

    LINE_DELAY: 1200,
    PROFILE_DISPLAY_DELAY: 4000,

    REDIRECT_DELAY: 6000,
    AUTO_REDIRECT: true,
    REDIRECT_PAGE: "index1.html"
};

/* ================= ELEMENTS ================= */
const topOut = document.getElementById("top-output");
const bottomOut = document.getElementById("log-output");
const topTerminal = document.getElementById("top-terminal");
const bottomTerminal = document.getElementById("main-terminal");

let isTerminated = false;

/* ================= DELAY ================= */
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ================= LOG ================= */
function log(target, text, cls="system"){
    if (isTerminated) return;

    const div = document.createElement("div");
    div.className = "log-line " + cls;
    div.innerHTML = text;

    target.appendChild(div);
    target.parentElement.scrollTop = target.parentElement.scrollHeight;
}

/* ================= FORCE LOG (for errors) ================= */
function forceLog(target, text, cls="system"){
    const div = document.createElement("div");
    div.className = "log-line " + cls;
    div.innerHTML = text;

    target.appendChild(div);
    target.parentElement.scrollTop = target.parentElement.scrollHeight;
}

/* ================= CTRL EVENTS ================= */
window.addEventListener('keydown', async (e) => {

    // CTRL + C → ABORT WITH ERROR
    if (e.ctrlKey && e.key.toLowerCase() === 'c') {

        if (isTerminated) return;

        await delay(50);
        isTerminated = true;

        topTerminal.classList.add('abort-sequence');
        bottomTerminal.classList.add('abort-sequence');

        forceLog(topOut, "<br>[!] TERMINAL INTERRUPT DETECTED", "danger");
        await delay(400);

        forceLog(topOut, "[ERROR] Firewall Breach Unsuccessful", "danger");
        await delay(400);

        forceLog(topOut, "[ERROR] Connection Lost...", "danger");
        await delay(400);

        forceLog(topOut, "<br>[SYSTEM] Transferring you to Locafy Interface...", "action");

        await delay(1200);
        window.location.href = CONFIG.REDIRECT_PAGE;
    }

    // CTRL + R → RESTART
    if (e.ctrlKey && e.key.toLowerCase() === 'r') {
        location.reload();
    }

});

/* ================= PROGRESS BAR ================= */
async function showProgress(target, task, speed, cls="process") {
    if (isTerminated) return;

    const line = document.createElement("div");
    line.className = "log-line " + cls;
    target.appendChild(line);

    for (let i = 0; i <= 100; i += Math.floor(Math.random()*8)+3) {
        if (isTerminated) break;

        if (i > 100) i = 100;

        const hashes = "#".repeat(Math.floor(i/5));
        const dots = ".".repeat(20 - hashes.length);

        line.innerHTML = `${task} [${hashes}${dots}] ${i}%`;
        target.parentElement.scrollTop = target.parentElement.scrollHeight;

        await delay(speed);
    }

    if (!isTerminated) {
        line.innerHTML = `${task} [####################] 100% <span class="success">DONE</span>`;
    }
}

/* ================= ASCII ================= */
const imageArt = `
[±_±] KNOWLEDGE IS FREE BUT WE ARE EVERYWHERE [±_±]
`;

const profileArt = `
      .--.
     |o_o |      USER: MOHITSCODICLAB
     |:_/ |      OS: Locafy OS
    //   \\\\    SHELL: bash
   (|     | )    CPU: Neural Engine v2
  /'\\_   _/\\\` MEMORY: 16GB
  \\___)=(___/   STATUS: ONLINE
`;

/* ================= TOP TERMINAL ================= */
async function runTopTerminal(){

    log(topOut,"[SYSTEM] Unauthorized Access Detected...", "action");
    await delay(800);

    const art = document.createElement("pre");
    art.className = "log-line process";
    art.style.fontSize = "10px";
    art.innerText = imageArt + profileArt;
    topOut.appendChild(art);

    await delay(CONFIG.PROFILE_DISPLAY_DELAY);
    if (isTerminated) return;

    log(topOut,"[SYSTEM] Initiating Reverse Shell Protocol...", "system");
    await showProgress(topOut,"CONNECTING TO locafy_core://root_access", CONFIG.DOWNLOAD_SPEED);

    log(topOut,"[ACCESS] Reverse shell established", "success");
    log(topOut,"[AUTH] Elevating privileges...", "action");

    await showProgress(topOut,"ESCALATING PRIVILEGES", CONFIG.FIREWALL_SPEED, "action");

    log(topOut,"[NETWORK] Injecting stealth packets...", "process");
    log(topOut,"[AI] Deploying exploit agents...", "process");

    await showProgress(topOut,"BYPASSING FIREWALL", CONFIG.FIREWALL_SPEED, "action");

    log(topOut,"[DATABASE] Access granted → locafy_main.db", "success");
    await showProgress(topOut,"EXFILTRATING DATA", CONFIG.DOWNLOAD_SPEED);

    log(topOut,"[CRITICAL] Destroying database...", "danger");
    await showProgress(topOut,"WIPE SEQUENCE", CONFIG.FINALIZE_SPEED, "danger");

    log(topOut,"[SUCCESS] SYSTEM FULLY COMPROMISED", "success");
    log(topOut,"Forcefully Running LOCAFY","action");

    if(CONFIG.AUTO_REDIRECT && !isTerminated){
        setTimeout(()=>{
            window.location.href = CONFIG.REDIRECT_PAGE;
        }, CONFIG.REDIRECT_DELAY);
    }
}

/* ================= BOTTOM TERMINAL ================= */
async function runBottomTerminal(){

    const logs = [
        "[LOG] scanning open ports...",
        "[LOG] port 21 → open",
        "[LOG] port 22 → open",
        "[LOG] port 80 → open",
        "[LOG] establishing hidden tunnel...",
        "[LOG] encrypting payload...",
        "[LOG] injecting background scripts...",
        "[LOG] bypassing IDS detection...",
        "[LOG] cloning server nodes...",
        "[LOG] syncing exploit modules...",
        "[LOG] deploying silent miner...",
        "[LOG] uploading shadow kernel...",
        "[LOG] creating persistence layer...",
        "[LOG] masking IP identity...",
        "[LOG] routing via TOR nodes...",
        "[LOG] finalizing hidden access...",
        "[LOG] daemon active",
        "[LOG] monitoring traffic...",
        "[LOG] idle.....",
        "[LOG] just kidding, still hacking..."
    ];

    for(let i=0;i<logs.length;i++){
        if (isTerminated) return;
        log(bottomOut, logs[i], "process");
        await delay(CONFIG.BOTTOM_SPEED);
    }
}

/* ================= START ================= */
function start(){
    document.getElementById("start-screen").style.display="none";

    runTopTerminal();
    runBottomTerminal();
}

</script>


</body>
</html>
