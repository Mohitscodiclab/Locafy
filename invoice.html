<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice Verification</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
padding:40px;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
color:#2E7D32;
margin-bottom:5px;
}

.subtitle{
color:#777;
margin-bottom:30px;
}

.section{
margin-top:25px;
font-size:16px;
line-height:1.6;
}

.label{
font-weight:bold;
color:#333;
}



/* Container to align buttons side-by-side */
.action-area {
    display: flex;
    flex-direction: row; /* Side-by-side on desktop */
    flex-wrap: wrap;     /* Stack on mobile if needed */
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}

.btn-3d {
    padding: 14px 25px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s ease;
}

/* WhatsApp Green 3D */
.whatsapp-btn {
    background: #25D366;
    box-shadow: 0 4px #128C7E;
}

/* Download Blue 3D */
.download-btn {
    background: #1976D2;
    box-shadow: 0 4px #0D47A1;
    display: inline-block;
    margin-top: 25px;

}

/* Press effect for both */
.btn-3d:active {
    box-shadow: 0 1px #128C7E;
    transform: translateY(3px);
}

@media print {
    .action-area { display: none !important; }
}





table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#2E7D32;
color:white;
}

.total{
text-align:right;
font-size:22px;
margin-top:20px;
font-weight:bold;
color:#2E7D32;
}

.notice{
margin-top:40px;
padding:20px;
background:#FFF3CD;
border:1px solid #ffeeba;
font-weight:bold;
text-align:center;
line-height:1.6;
}

.whatsapp-btn{

display:inline-block;
margin-top:25px;
padding:14px 25px;
background:#25D366;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:6px;
font-size:18px;

}

.whatsapp-btn:hover{
background:#1ebe5d;
}

</style>

</head>

<body>

<div class="container">

<h1>Hindustan Beej Bhandar</h1>
<div class="subtitle">Thali Bazar, Near Petrol Pump</div>

<div id="invoiceContent"></div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("hbb_invoice"));

if (!data) {
    document.getElementById("invoiceContent").innerHTML = "<h2>No invoice data found</h2>";
    throw new Error("No invoice");
}

let rows = "";
let whatsappItems = "";
let calculatedGrandTotal = 0; // We recalculate to be 100% sure

data.items.forEach(item => {
    // FIX: Remove commas and convert to number
    const unitPrice = parseFloat(String(item.price).replace(/,/g, '')) || 0;
    const qty = parseInt(item.quantity) || 0;
    const subtotal = unitPrice * qty;
    
    calculatedGrandTotal += subtotal;

    // Format for Table (e.g., 1,66,547.28)
    const displayPrice = unitPrice.toLocaleString('en-IN', { minimumFractionDigits: 2 });
    const displaySubtotal = subtotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });

    rows += `
    <tr>
        <td>${item.name}</td>
        <td>${qty}</td>
        <td>₹${displayPrice}</td>
        <td>₹${displaySubtotal}</td>
    </tr>
    `;

    whatsappItems += `${item.name} x${qty} = ₹${displaySubtotal}%0A`;
});

// Format the final total for display
const finalTotalDisplay = calculatedGrandTotal.toLocaleString('en-IN', { minimumFractionDigits: 2 });

const whatsappMessage =
    `*HINDUSTAN BEEJ BHANDAR ORDER*%0A%0A` +
    `Invoice ID: ${data.invoiceId}%0A` +
    `Customer: ${data.customerName}%0A` +
    `Father Name: ${data.fatherName}%0A` +
    `Phone: ${data.phone}%0A%0A` +
    `*ORDER ITEMS*%0A` +
    `${whatsappItems}%0A` +
    `Grand Total: ₹${finalTotalDisplay}%0A%0A` +
    `UTR: ${data.utr}%0A%0A` +
    `Payment App: ${data.paymentApp}%0A%0A` +
    `I have also attached payment screenshot and order screenshot.`;

const whatsappURL = `https://wa.me/919931753119?text=${whatsappMessage}`;

// Update the UI
document.getElementById("invoiceContent").innerHTML = `
<div class="section">
    <div><span class="label">Invoice ID:</span> ${data.invoiceId}</div>
    <div><span class="label">Date:</span> ${data.date}</div>
</div>

<div class="section">
    <div><span class="label">Customer Name:</span> ${data.customerName}</div>
    <div><span class="label">Father Name:</span> ${data.fatherName}</div>
    <div><span class="label">Phone:</span> ${data.phone}</div>
</div>

<div class="section">
    <div class="label">Address</div>
    ${data.address}<br>
    ${data.district}, ${data.state} - ${data.pincode}
</div>

<div class="section">
    <div><span class="label">Payment App:</span> ${data.paymentApp}</div>
    <div><span class="label">UTR / Transaction ID:</span> ${data.utr}</div>
</div>

<table>
    <tr>
        <th>Item</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
    </tr>
    ${rows}
</table>

<div class="total">
    Grand Total : ₹${finalTotalDisplay}
</div>

<div class="notice">
    ⚠️ IMPORTANT<br>
    1️⃣ Download The Invoice (PDF)<br>
    2️⃣ Also take screenshot of your PAYMENT confirmation<br>
    3️⃣ Send both on WhatsApp to confirm order.
</div>

<div class="action-area">
    <a class="btn-3d whatsapp-btn" href="${whatsappURL}" target="_blank">
        📲 Send on WhatsApp
    </a>
    <button class="btn-3d download-btn" onclick="downloadInvoice()">
        📥 Download Invoice (PDF)
    </button>
</div>
`;

// Function that downlaods the professional invoice
function downloadInvoice() {
    // 1. Get the target element. Instead of the whole body, 
    // we use just the main white container for a clean PDF look.
    const element = document.querySelector('.container'); 
    const invoiceId = data ? data.invoiceId : "Invoice";
    
    // 2. Proactively hide elements we DON'T want in the PDF 
    // to prevent clutter and weird scaling.
    const actionArea = document.querySelector('.action-area');
    const notice = document.querySelector('.notice');
    actionArea.style.display = 'none'; // Temporarily hide buttons
    notice.style.display = 'none'; // Notice is useful on screen, not PDF

    // 3. Define professional options
    const options = {
        // Set filename precisely to the Invoice ID
        filename: `${invoiceId}.pdf`,
        
        // Optimize image conversion quality (crucial for clarity)
        image: { type: 'jpeg', quality: 0.98 },
        
        // Use high-resolution scaling during capture. This creates a sharp PDF.
        html2canvas: { scale: 3 }, 
        
        // Define page settings
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
        
        // CONTROL PAGE BREAKS. 
        // This is the single key option that prevents content from splitting unprofessionally.
        pagebreak: { mode: 'avoid-all' } 
    };

    // 4. Generate and save the PDF
    // First apply settings, then capture the element, and finally save.
    html2pdf().set(options).from(element).save().then(() => {
        // 5. Restore the screen visibility AFTER generation is complete
        actionArea.style.display = 'flex'; // Buttons are back
        notice.style.display = 'block'; // Notice is back
    });
}
</script>

</body>
</html>
